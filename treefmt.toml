#:schema https://www.schemastore.org/treefmt.json

[formatter.oxfmt]
command = "oxfmt"
options = ["--write"]
includes = ["*.ts", "*.tsx", "*.html", "*.css", "*.json", "*.yaml", "*.toml", "*.md"]

[formatter.go]
command = "gofmt"
includes = ["*.go"]

[formatter.buf]
command = "buf"
options = ["format", "--write"]
includes = ["*.proto"]
no-positional-arg-support = true

[formatter.sql]
command = "sqlfluff"
options = ["format"]
includes = ["*.sql"]

[formatter.nix]
command = "nixfmt"
includes = ["*.nix"]
