#:schema https://www.schemastore.org/treefmt.json

excludes = ["server/vendor/*", "server/connect/*", "web/connect/*"]

[formatter.go]
command = "gofmt"
includes = ["*.go"]

[formatter.biome-format]
command = "biome"
options = ["format", "--write"]
includes = ["*.ts", "*.tsx", "*.html", "*.css"]

[formatter.biome-lint]
command = "biome"
options = ["lint", "--unsafe", "--write"]
includes = ["*.ts", "*.tsx", "*.html", "*.css"]

[formatter.buf]
command = "buf"
options = ["format", "--write"]
includes = ["*.proto"]
no-positional-arg-support = true

[formatter.sql]
command = "sqlfluff"
options = ["format"]
includes = ["*.sql"]

[formatter.nix]
command = "nixfmt"
includes = ["*.nix"]

[formatter.toml]
command = "tombi"
options = ["format"]
includes = ["*.toml"]

[formatter.prettier]
command = "prettier"
options = ["--write"]
includes = ["*.yaml", "*.json", "*.md"]
