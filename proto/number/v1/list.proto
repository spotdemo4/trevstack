edition = "2024";

package number.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

message Item {
  google.protobuf.Timestamp timestamp = 1;
  string name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 50
  }];
  uint32 number = 3 [(buf.validate.field).uint32 = {
    gte: 0
    lte: 1000000
  }];
}

message ListRequest {
  string name = 1 [(buf.validate.field).string = {
    min_len: 0
    max_len: 50
  }];
  uint32 minimum = 2 [(buf.validate.field).uint32 = {
    gte: 0
    lte: 1000000
  }];
  uint32 maximum = 3 [(buf.validate.field).uint32 = {
    gte: 0
    lte: 1000000
  }];
  google.protobuf.Timestamp start = 4;
  google.protobuf.Timestamp end = 5;

  option (buf.validate.message).cel = {
    id: "end_after_start"
    message: "End must be after start"
    expression: "!has(this.end) || !has(this.start) || this.end > this.start"
  };
  option (buf.validate.message).cel = {
    id: "minimum_less_than_maximum"
    message: "Minimum must be less than maximum"
    expression: "!has(this.minimum) || !has(this.maximum) || this.minimum < this.maximum"
  };
}

message ListResponse {
  Item item = 1;
}
