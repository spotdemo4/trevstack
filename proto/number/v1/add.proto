syntax = "proto3";

package number.v1;

import "buf/validate/validate.proto";

message AddRequest {
  string name = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 50
  }];
  uint32 number = 2 [(buf.validate.field).uint32 = {
    gte: 0
    lte: 1000000
  }];
}

message AddResponse {
  uint64 sum = 1;
}
