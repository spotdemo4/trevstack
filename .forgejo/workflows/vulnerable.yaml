name: vulnerable

on:
  schedule:
    - cron: "0 9 * * 0" # every Sunday at 09:00 UTC
  workflow_dispatch:

# yaml-language-server-disable is not allowed
enable-openid-connect: true

jobs:
  go:
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
    steps:
      - name: Initialize
        uses: spotdemo4/nix-init@8cfbe9e5d4eef03c557a70763c90af7ff4aafe67 # v1.46.0
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          shell: vulnerable

      - name: Run govulncheck
        run: cd server && govulncheck ./...

  npm:
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
    steps:
      - name: Initialize
        uses: spotdemo4/nix-init@8cfbe9e5d4eef03c557a70763c90af7ff4aafe67 # v1.46.0
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          shell: vulnerable

      - name: Run npm audit
        run: cd web && npm audit --audit-level moderate

  nix:
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
    steps:
      - name: Initialize
        uses: spotdemo4/nix-init@8cfbe9e5d4eef03c557a70763c90af7ff4aafe67 # v1.46.0
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          shell: vulnerable

      - name: Run flake-checker
        run: flake-checker -f

  actions:
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
    steps:
      - name: Initialize
        uses: spotdemo4/nix-init@8cfbe9e5d4eef03c557a70763c90af7ff4aafe67 # v1.46.0
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          shell: vulnerable

      - name: Run zizmor
        run: zizmor .github
