<!doctype html>
<html lang="en">
  <head>
    <script>
      if (
        localStorage.theme === "dark" ||
        (!("theme" in localStorage) && window.matchMedia("(prefers-color-scheme: dark)").matches)
      ) {
        document.documentElement.classList.add("dark");
        document.documentElement.classList.add("mocha");
      } else {
        document.documentElement.classList.add("light");
        document.documentElement.classList.add("latte");
      }
    </script>
    <style>
      html {
        background-color: #eff1f5;
      }
      html.dark {
        background-color: #1e1e2e;
      }
    </style>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#04a5e5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#89dceb" media="(prefers-color-scheme: dark)" />
    <link rel="shortcut icon" type="image/ico" href="/assets/favicon.ico" />
    <title>TrevStack</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="app" class="bg-ctp-base"></div>
    <script src="/index.tsx" type="module"></script>
  </body>
</html>
